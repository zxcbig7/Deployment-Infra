apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: infra
spec:
  project: default
  source:
    repoURL: https://raw.githubusercontent.com/bitnami/charts/archive-full-index/bitnami
    chart: postgresql
    targetRevision: 18.6.2
    helm:
      releaseName: postgresql
      values: |
        auth:
          existingSecret: postgresql-secret
          secretKeys:
            adminPasswordKey: postgres-password
        primary:
          persistence:
            enabled: true
            size: 2Gi
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
